<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Chumash Painted Stone">
  <title>Califia Painted Island Stone</title>
  <desc>Sandstone pebble painted with red-ocher spoked wheel and charcoal circle, four white star-dots at inter-cardinal, unpainted natural pit at center.</desc>

  <defs>
    <radialGradient id="stoneBase" cx="42%" cy="40%" r="68%">
      <stop offset="0%" stop-color="#c9a274"/>
      <stop offset="55%" stop-color="#a37d52"/>
      <stop offset="100%" stop-color="#4d3620"/>
    </radialGradient>
    <radialGradient id="stoneSheen" cx="38%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#ffe2b8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffe2b8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- === Invisible canonical cipher skeleton (identical across all artifacts) === -->
  <g id="cipher-skeleton" stroke="none" fill="none" opacity="0">
    <circle cx="200" cy="200" r="180"/>
    <line x1="20" y1="200" x2="380" y2="200"/>
    <line x1="200" y1="20" x2="200" y2="380"/>
    <polygon points="73,73 327,73 327,327 73,327"/>
    <circle cx="200" cy="200" r="14" fill="none"/>
  </g>

  <!-- Irregular pebble silhouette -->
  <g id="stone-base">
    <path d="M196 22
             C 252 20 306 40 342 78
             C 378 118 386 176 374 232
             C 362 292 326 338 274 362
             C 220 384 156 382 112 358
             C 62 332 28 286 22 226
             C 16 166 38 106 82 68
             C 120 36 156 24 196 22 Z"
          fill="url(#stoneBase)" stroke="#3d2a18" stroke-width="2"/>
    <!-- Speckles -->
    <g fill="#5a3f22" opacity="0.5">
      <circle cx="80" cy="120" r="1.6"/>
      <circle cx="120" cy="80" r="1.2"/>
      <circle cx="310" cy="110" r="1.8"/>
      <circle cx="340" cy="200" r="1.4"/>
      <circle cx="300" cy="300" r="1.6"/>
      <circle cx="120" cy="320" r="1.5"/>
      <circle cx="70" cy="240" r="1.3"/>
      <circle cx="250" cy="60" r="1.2"/>
      <circle cx="150" cy="350" r="1.6"/>
      <circle cx="230" cy="350" r="1.2"/>
    </g>
    <!-- Mineral veins -->
    <path d="M50 180 Q 140 170 220 190 T 350 180" stroke="#8a6a3e" stroke-width="0.7" fill="none" opacity="0.45"/>
    <path d="M80 280 Q 180 260 260 280" stroke="#8a6a3e" stroke-width="0.6" fill="none" opacity="0.4"/>
    <ellipse cx="180" cy="160" rx="120" ry="80" fill="url(#stoneSheen)"/>
  </g>

  <!-- Charcoal outer circle -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#1a1108" stroke-width="5" opacity="0.9"/>
  <circle cx="200" cy="200" r="150" fill="none" stroke="#000" stroke-width="1.5" opacity="0.6"/>

  <!-- Red-ocher spoked wheel — four cardinal spokes (hidden cross) -->
  <g id="spoked-wheel" stroke="#a2331c" stroke-width="7" stroke-linecap="round" opacity="0.92">
    <line x1="60" y1="200" x2="340" y2="200"/>
    <line x1="200" y1="60" x2="200" y2="340"/>
  </g>
  <!-- Hand-painted wobble accents -->
  <g stroke="#742014" stroke-width="1.6" fill="none" opacity="0.65">
    <path d="M60 198 Q 150 200 200 198 T 340 198"/>
    <path d="M202 60 Q 200 150 202 200 T 202 340"/>
  </g>

  <!-- Four white star-dots at inter-cardinal (hidden rotated square vertices) -->
  <g id="star-dots" fill="#f3ecd8" stroke="#1a1108" stroke-width="0.8">
    <g transform="translate(73,73)">
      <circle r="9" opacity="0.95"/>
      <g stroke="#f3ecd8" stroke-width="1.5" stroke-linecap="round">
        <line x1="-12" y1="0" x2="12" y2="0"/>
        <line x1="0" y1="-12" x2="0" y2="12"/>
        <line x1="-8" y1="-8" x2="8" y2="8"/>
        <line x1="-8" y1="8" x2="8" y2="-8"/>
      </g>
    </g>
    <g transform="translate(327,73)">
      <circle r="9" opacity="0.95"/>
      <g stroke="#f3ecd8" stroke-width="1.5" stroke-linecap="round">
        <line x1="-12" y1="0" x2="12" y2="0"/>
        <line x1="0" y1="-12" x2="0" y2="12"/>
        <line x1="-8" y1="-8" x2="8" y2="8"/>
        <line x1="-8" y1="8" x2="8" y2="-8"/>
      </g>
    </g>
    <g transform="translate(327,327)">
      <circle r="9" opacity="0.95"/>
      <g stroke="#f3ecd8" stroke-width="1.5" stroke-linecap="round">
        <line x1="-12" y1="0" x2="12" y2="0"/>
        <line x1="0" y1="-12" x2="0" y2="12"/>
        <line x1="-8" y1="-8" x2="8" y2="8"/>
        <line x1="-8" y1="8" x2="8" y2="-8"/>
      </g>
    </g>
    <g transform="translate(73,327)">
      <circle r="9" opacity="0.95"/>
      <g stroke="#f3ecd8" stroke-width="1.5" stroke-linecap="round">
        <line x1="-12" y1="0" x2="12" y2="0"/>
        <line x1="0" y1="-12" x2="0" y2="12"/>
        <line x1="-8" y1="-8" x2="8" y2="8"/>
        <line x1="-8" y1="8" x2="8" y2="-8"/>
      </g>
    </g>
  </g>

  <!-- Natural unpainted pit at center (hidden void) -->
  <g id="natural-pit">
    <circle cx="200" cy="200" r="14" fill="#2c1c0e"/>
    <circle cx="200" cy="200" r="14" fill="none" stroke="#000" stroke-width="1"/>
    <ellipse cx="196" cy="197" rx="4.5" ry="2.8" fill="#4f3820" opacity="0.6"/>
  </g>
</svg>
